<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lycalopex — Inteligência ESG para Campo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Map-based search styles */
    .search-container {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .map-panel {
      flex: 1;
      min-width: 300px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      padding: 2rem;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .map-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .region-map {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .region-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }

    .region-btn {
      padding: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .region-btn:hover {
      transform: translateX(4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .region-btn.active {
      border: 3px solid white;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .region-name {
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }

    .region-states {
      font-size: 0.75rem;
      opacity: 0.9;
    }

    .state-selector,
    .city-selector {
      background: rgba(255,255,255,0.95);
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 1rem;
    }

    .selector-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 1rem;
      text-align: center;
    }

    .state-buttons,
    .city-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 0.5rem;
    }

    .state-btn,
    .city-btn {
      padding: 0.75rem;
      border: 2px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      color: #333;
    }

    .state-btn:hover,
    .city-btn:hover {
      border-color: #667eea;
      background: #f0f4ff;
      transform: translateY(-2px);
    }

    .state-btn.active,
    .city-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .results-panel {
      flex: 2;
      min-width: 300px;
    }

    .loading-spinner {
      text-align: center;
      padding: 2rem;
      color: #667eea;
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .search-breadcrumb {
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.95rem;
      color: #666;
    }

    .breadcrumb-item {
      display: inline-block;
      margin-right: 0.5rem;
    }

    .breadcrumb-item::after {
      content: ' → ';
      margin-left: 0.5rem;
      color: #999;
    }

    .breadcrumb-item:last-child::after {
      content: '';
    }

    .breadcrumb-item.active {
      color: #667eea;
      font-weight: 700;
    }

    /* Hide elements initially */
    .hidden {
      display: none !important;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .search-container {
        flex-direction: column;
      }

      .state-buttons,
      .city-buttons {
        grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      }

      .region-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1 class="header-title">🌍 Lycalopex ESG Intelligence</h1>
        <p class="header-subtitle">Busca por Região → Estado → Cidade | Todas as empresas ordenadas por ESG Risk Score</p>
      </div>
    </header>

    <!-- Main content -->
    <main class="main">
      <!-- Step-by-step search -->
      <div class="search-container">
        <!-- Map panel (left) -->
        <div class="map-panel" id="map-panel">
          <div id="region-map-container"></div>
          <div id="state-selector-container" class="hidden"></div>
          <div id="city-selector-container" class="hidden"></div>
        </div>

        <!-- Results panel (right) -->
        <div class="results-panel">
          <div id="search-breadcrumb" class="search-breadcrumb hidden">
            <span class="breadcrumb-item" id="breadcrumb-region"></span>
            <span class="breadcrumb-item" id="breadcrumb-state"></span>
            <span class="breadcrumb-item" id="breadcrumb-city"></span>
          </div>

          <div id="results-container">
            <div style="text-align: center; padding: 2rem; color: #999;">
              Selecione uma região para começar
            </div>
          </div>
        </div>
      </div>

      <!-- Stats bar -->
      <div id="stats-bar" class="stats-bar hidden"></div>

      <!-- Results table -->
      <div id="table-container" class="hidden">
        <div class="table-controls">
          <div class="control-group">
            <label for="filter-type">Tipo:</label>
            <select id="filter-type"></select>
          </div>
          <div class="control-group">
            <label for="filter-esg">ESG Risk:</label>
            <select id="filter-esg">
              <option value="">Todos</option>
              <option value="Crítico">Crítico</option>
              <option value="Alto">Alto</option>
              <option value="Moderado">Moderado</option>
              <option value="Baixo">Baixo</option>
            </select>
          </div>
          <div class="control-group">
            <label for="sort-field">Ordenar por:</label>
            <select id="sort-field">
              <option value="esg">ESG Risk (↓)</option>
              <option value="vulnerability">Vulnerabilidade (↓)</option>
              <option value="resistance">Resistência (↓)</option>
              <option value="razaoSocial">Razão Social (A-Z)</option>
            </select>
          </div>
          <button id="export-csv" class="btn btn-secondary">📥 Exportar CSV</button>
        </div>

        <table id="results-table" class="results-table">
          <thead>
            <tr>
              <th class="col-cnpj">CNPJ</th>
              <th class="col-razao">Razão Social</th>
              <th class="col-municipio">Município</th>
              <th class="col-cnae">CNAE</th>
              <th class="col-vulnerability">Vulnerabilidade</th>
              <th class="col-resistance">Resistência</th>
              <th class="col-env">Ambiental</th>
              <th class="col-ac">Compliance</th>
              <th class="col-esg">ESG Risk</th>
              <th class="col-expand"></th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr class="empty-state">
              <td colspan="10">Carregando dados...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- ESG Intelligence API Key Configuration -->
  <script>
    window.__LYCALOPEX_API_KEY__ = '1d5r8yt963h2v4g5h6j3k138sbfiec21';
  </script>

  <!-- App entry -->
  <script type="module">
    console.log('[Lycalopex] app-map bootstrap starting...');
    import('./js/app-map.js').catch(err => {
      console.error('[Lycalopex] Failed to load app-map.js', err);
      const panel = document.getElementById('region-map-container');
      if (panel) {
        panel.innerHTML = '<div style="padding:1rem;color:#fff;font-weight:600;">Falha ao carregar interface interativa. Verifique o console do navegador.</div>';
      }
    });
  </script>
</body>
</html>
