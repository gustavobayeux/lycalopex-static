# .github/workflows/deploy.yml
# Lycalopex — GitHub Pages deployment
#
# Triggers on every push to the main branch.
# Since this is a pure static site (no build step), we deploy the repo root directly.
#
# Setup instructions:
#   1. Go to your repository Settings → Pages
#   2. Set Source to "GitHub Actions"
#   3. Push to main — this workflow will deploy automatically

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # No build step needed — pure HTML/CSS/JS
      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repo root (index.html, css/, js/, data/)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
